<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Oikos OS</title>
    <script>
      (function () {
        var redirect = window.location.search.match(/[?&]spa=([^&]+)/);

        if (!redirect) {
          return;
        }

        var decodedPath = decodeURIComponent(redirect[1]);
        var cleanUrl = decodedPath + window.location.hash;

        window.history.replaceState(null, "", cleanUrl);
      })();
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- 🔥 THIS IS REQUIRED -->
    <div id="root"></div>

  </body>
</html>
